name: Bug report
description: Report reproducible incorrect behavior using synthetic data only.
title: "[Bug]: "
labels: []
body:
  - type: markdown
    attributes:
      value: >-
        Do not include real personal data, credentials, secrets, private documents,
        financial data, medical data, legal data, identity documents, or screenshots
        containing private information. Create a synthetic P0 reproduction instead.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 candidate or commit SHA
    validations:
      required: true
  - type: textarea
    id: behavior
    attributes:
      label: Reproduction and observed behavior
      description: Include minimal PowerShell commands and synthetic input.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I used synthetic P0 information only.
          required: true
